name: 'Domloo Release Action'
description: 'Smart release automation using custom bot identities'

inputs:
  token:
    description: 'GitHub Token'
    required: false
    default: ${{ github.token }}

runs:
  using: "composite" # Ini pembedanya, ngasih tahu GitHub kalau ini composite
  steps:
    - name: Deteksi Trigger
      shell: bash # DI COMPOSITE WAJIB TULIS SHELL DI TIAP STEP RUN
      run: |
        if [ "${{ github.event_name }}" == "issue_comment" ]; then
          COMMENT_BODY="${{ github.event.comment.body }}"
          echo "COMMENT_FOUND=$COMMENT_BODY" >> $GITHUB_ENV
          echo "IS_COMMENT=true" >> $GITHUB_ENV
        fi

    - name: Jalankan Otak Bot Pinter
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token || github.token }}
      run: node ${{ github.action_path }}/dist/index.js

    - name: Update File Konfigurasi Projek (SED Engine)
      if: env.NEW_VERSION != ''
      shell: bash
      run: |
        if [ -f "package.json" ]; then
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ env.NEW_VERSION }}\"/g" package.json
        fi
        if [ -f "Cargo.toml" ]; then
          sed -i "s/^version = \".*\"/version = \"${{ env.NEW_VERSION }}\"/g" Cargo.toml
        fi

    - name: Create Release Branch and Push
      if: env.NEW_VERSION != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token || github.token }}
        GH_TOKEN: ${{ inputs.token || github.token }}
      run: |
        git config --global user.name "domloo-release[bot]"
        git config --global user.email "293296910+domloo-release[bot]@users.noreply.github.com"
        
        if [ -f "docs/CHANGELOG.md" ]; then
          cat current_changelog.md docs/CHANGELOG.md > temp_changelog.md && mv temp_changelog.md docs/CHANGELOG.md
        else
          cp current_changelog.md docs/CHANGELOG.md
        fi

        BRANCH_NAME="release/${{ env.NEW_VERSION }}"
        
        # Cukup satu baris ini buat gantiin seluruh logic if-else pengecekan branch lama
        git checkout -B "$BRANCH_NAME"

        [ -f "package.json" ] && git add package.json
        [ -f "Cargo.toml" ] && git add Cargo.toml
        [ -f "docs/CHANGELOG.md" ] && git add docs/CHANGELOG.md

        git commit -m "chore: prepare release ${{ env.NEW_VERSION }}" || echo "No changes to commit"
        
        # Dorong paksa ke remote, auto tembus mau kondisinya kayak gimana pun
        git push -f "https://x-access-token:${{ inputs.token || github.token }}@github.com/${{ github.repository }}.git" "$BRANCH_NAME"

        # ... sisa perintah gh pr list, cleanup, dan pr create ke bawah ...

        PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')

        OLD_PRS=$(gh pr list --base main --state open --limit 100 --json headRefName,number -q '.[] | select(.headRefName != null and (.headRefName | startswith("release/")) and .headRefName != "'"$BRANCH_NAME"'") | .number')
        
        if [ ! -z "$OLD_PRS" ]; then
          for PR_NUM in $OLD_PRS; do
            OLD_BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
            echo "Closing old PR #$PR_NUM and deleting branch $OLD_BRANCH..."
            
            gh pr close "$PR_NUM" --delete-branch
            git push "https://x-access-token:${{ inputs.token || github.token }}@github.com/${{ github.repository }}.git" --delete "$OLD_BRANCH" 2>/dev/null || true
          done
        else
          echo "No old release PRs to cleanup."
        fi

        PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')

        if [ -z "$PR_EXISTS" ]; then
          echo "Opening a brand new Release PR for $BRANCH_NAME..."
          gh pr create \
            --title "chore: release ${{ env.NEW_VERSION }}" \
            --body-file current_changelog.md \
            --base main \
            --head "$BRANCH_NAME"
        else
          echo "Updating existing PR #$PR_EXISTS body..."
          gh pr edit "$PR_EXISTS" --body-file current_changelog.md
        fi
